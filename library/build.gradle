plugins {
    id "com.android.library"
    id "maven-publish"
}

ext {
    customVersionCode = 1
    customVersionName = '1.0.0'
    customGroupId = 'com.ikecin.sdk'
    customArtifactId = 'jni' // 必须保证artifactId唯一
}

android {
    namespace "${customGroupId}.${customArtifactId}"
    compileSdk 35
    defaultConfig {
        minSdk 23
        targetSdk 35
        versionCode customVersionCode
        versionName customVersionName
        consumerProguardFiles 'consumer-proguard-rules.pro'
        ndk {
            moduleName "Demo"
        }
        externalNativeBuild {
            cmake {
                arguments.add("-DARTIFACT_ID=$customArtifactId") // 自定义 CMakeLists 变量
                cFlags ""
                cppFlags ""
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            // 注意：library 中不要使用 proguard-android-optimize.txt，其中包含 -allowaccessmodification，会导致编译成 aar 后，部分 private 变量变 public
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro', 'consumer-proguard-rules.pro'
            debuggable false
            jniDebuggable false
        }
        debug {
            minifyEnabled false
            debuggable true
            jniDebuggable true
        }
    }
    buildFeatures {
        buildConfig true
        dataBinding false
        viewBinding false
    }
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    publishing {
        singleVariant('release') {
            withSourcesJar()
            //withJavadocJar()
        }
    }
}

// 用于编译时保留方法参数名
tasks.withType(JavaCompile).configureEach {
    options.compilerArgs << '-parameters'
}

repositories {
    flatDir {
        dirs 'libs'
    }
}

dependencies {
    // library 不支持包含 aar，可以使用 compileOnly、compileOnlyApi、在线引用，或者为 aar 创建单独的 module
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'

    // 需要对外暴露的依赖使用 api，需要对外隐藏的依赖使用 implementation
    implementation 'androidx.annotation:annotation:1.2.0'
}

// 执行 gradlew publish 即可发布到本地目录
publishing {
    publications {
        lib(MavenPublication) {
            groupId customGroupId
            artifactId customArtifactId
            version customVersionName
            afterEvaluate {
                from components.release
            }
        }
    }
    repositories {
        maven {
            name = 'local'
            url = layout.buildDirectory.dir("maven")
        }
        if (project.hasProperty("remoteMavenUrl")) {
            maven {
                url = project.findProperty('remoteMavenUrl')
                credentials {
                    username = project.findProperty('remoteMavenUsername')
                    password = project.findProperty('remoteMavenPassword')
                }
            }
        }
    }
}